<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lyrics Generator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: Arial, sans-serif;
    background: #f5f5f5;
    margin: 0;
    padding: 15px;
    text-align: center;
}

.container {
    max-width: 500px;
    margin: auto;
}

textarea {
    width: 100%;
    height: 120px;
    padding: 12px;
    font-size: 25px;
    border-radius: 10px;
    border: 1px solid #ccc;
    resize: none;
}

button {
    width: 100%;
    padding: 14px;
    margin-top: 10px;
    font-size: 16px;
    border-radius: 10px;
    border: none;
    background: black;
    color: white;
}

canvas {
    width: 100%;
    max-width: 400px;
    margin-top: 15px;
    border-radius: 10px;
    border: 1px solid #ccc;
    background: white;
}
</style>
</head>
<body>

<div class="container">
    <h2>🎵 Lyrics Generator</h2>

    <textarea id="lyrics" placeholder="Type your lyrics..."></textarea>
    <button onclick="downloadImage()">Download</button>

    <canvas id="canvas" width="800" height="800"></canvas>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const textarea = document.getElementById("lyrics");

textarea.addEventListener("input", drawText);

function drawText() {
    const text = textarea.value;

    ctx.fillStyle = "white";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "black";
    ctx.textBaseline = "middle";

    let fontSize = 200;
    let lines = [];

    const CENTER_HEIGHT = canvas.height * 0.6;
    const START_Y_ZONE = (canvas.height - CENTER_HEIGHT) / 2;

    function wrapText(text, fontSize) {
        ctx.font = fontSize + "px Arial";
        let words = text.split(" ");
        let lines = [];
        let line = "";

        for (let i = 0; i < words.length; i++) {
            let testLine = line + words[i] + " ";
            let width = ctx.measureText(testLine).width;

            if (width > canvas.width * 0.8 && i > 0) {
                lines.push(line.trim());
                line = words[i] + " ";
            } else {
                line = testLine;
            }
        }
        lines.push(line.trim());
        return lines;
    }

    // Fit inside center zone
    while (fontSize > 85) {
        lines = wrapText(text, fontSize);
        let lineHeight = fontSize * 1.5;
        let totalHeight = lines.length * lineHeight;

        if (totalHeight < CENTER_HEIGHT) break;
        fontSize -= 2;
    }

    ctx.font = fontSize + "px Arial";

    let lineHeight = fontSize * 1.2;
    let totalHeight = lines.length * lineHeight;

    let startY = START_Y_ZONE + (CENTER_HEIGHT - totalHeight) / 2;

    ctx.filter = "blur(3px)";

    lines.forEach((line) => {

        let scaleY = 1.4; // 🔥 45% vertical stretch

        ctx.save();
        ctx.setTransform(1, 0, 0, scaleY, 0, 0);

        let adjustedY = startY / scaleY;

        let words = line.split(" ");
        let totalWordsWidth = words.reduce((sum, word) => {
            return sum + ctx.measureText(word).width;
        }, 0);

        let x = canvas.width * 0.1;

        let totalSpace = canvas.width * 0.8 - totalWordsWidth;
        let spaceWidth = words.length > 1 ? totalSpace / (words.length - 1) : 0;

        words.forEach((word, i) => {
            ctx.fillText(word, x, adjustedY);
            if (i < words.length - 1) {
                x += ctx.measureText(word).width + spaceWidth;
            }
        });

        ctx.restore();

        startY += lineHeight;
    });

    ctx.filter = "none";
}

drawText();

function downloadImage() {
    const link = document.createElement("a");
    link.download = "lyrics.png";
    link.href = canvas.toDataURL("image/png");
    link.click();
}
</script>

</body>
</html>
