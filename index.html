<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Easy Brat Lyrics</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@500&display=swap" rel="stylesheet">
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
body {
    margin: 0;
    font-family: 'Roboto', sans-serif;
    background: #ffffff;
}

.container {
    max-width: 1000px;
    margin: auto;
    padding: 30px;
}

h2 {
    text-align: center;
}

textarea {
    width: 100%;
    height: 120px;
    padding: 10px;
    font-size: 16px;
    margin-bottom: 20px;
}

.controls {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    margin-bottom: 30px;
    justify-content: center;
}

button {
    padding: 8px 16px;
    cursor: pointer;
    border: none;
    background: black;
    color: white;
}

.imagesContainer {
    display: flex;
    flex-wrap: wrap;
    gap: 30px;
    justify-content: center;
}

.imageBlock {
    display: flex;
    flex-direction: column;
    align-items: center;
}

.squareBox {
    width: 400px;
    height: 400px;
    padding: 30px;
    box-sizing: border-box;
    font-size: 26px;
    font-weight: 500;
    line-height: 1.6;
    white-space: pre-line;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    background: #ffffff;
    color: #000000;
}

.squareBox span {
    display: inline-block;
    transform: scaleY(1.25);
}

footer {
    margin-top: 60px;
    padding: 20px;
    text-align: center;
    background: #f2f2f2;
}

footer a {
    margin: 0 15px;
    text-decoration: none;
    color: black;
}

footer a:hover {
    text-decoration: underline;
}
</style>
</head>

<body>

<div class="container">
    <h2>Easy Brat Lyrics</h2>

    <textarea id="lyricsInput" placeholder="Paste full lyrics here..."></textarea>

    <div class="controls">
        <label>Text Color:
            <input type="color" id="textColor" value="#000000">
        </label>

        <label>Background:
            <input type="color" id="bgColor" value="#ffffff">
        </label>

        <button onclick="generateImages()">Generate</button>
    </div>

    <div id="imagesContainer" class="imagesContainer"></div>
</div>

<footer>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
    <a href="privacy-policy.html">Privacy Policy</a>
</footer>

<script>
function generateImages() {

    const input = document.getElementById("lyricsInput").value.trim();
    const words = input.split(/\s+/);

    const container = document.getElementById("imagesContainer");
    container.innerHTML = "";

    const textColor = document.getElementById("textColor").value;
    const bgColor = document.getElementById("bgColor").value;

    let cumulative = [];

    for (let i = 0; i < words.length; i++) {

        cumulative.push(words[i]);

        // Format into 3 words per line
        let formatted = "";
        for (let j = 0; j < cumulative.length; j++) {
            formatted += cumulative[j] + " ";
            if ((j + 1) % 3 === 0) {
                formatted += "\n";
            }
        }

        const block = document.createElement("div");
        block.className = "imageBlock";

        const box = document.createElement("div");
        box.className = "squareBox";
        box.style.backgroundColor = bgColor;
        box.style.color = textColor;

        box.innerHTML = "<span>" + formatted.trim() + "</span>";

        const downloadBtn = document.createElement("button");
        downloadBtn.innerText = "Download Image";

        downloadBtn.onclick = function() {
            html2canvas(box).then(canvas => {
                const link = document.createElement("a");
                link.download = "lyrics_step_" + (i+1) + ".png";
                link.href = canvas.toDataURL("image/png");
                link.click();
            });
        };

        block.appendChild(box);
        block.appendChild(downloadBtn);
        container.appendChild(block);
    }
}
</script>

</body>
</html>
