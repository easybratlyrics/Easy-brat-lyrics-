<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Easy Brat Lyrics</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>

body{
margin:0;
font-family:'Roboto',sans-serif;
background:#ffffff;
}

.container{
max-width:1000px;
margin:auto;
padding:30px;
}

h2{
text-align:center;
}

textarea{
width:100%;
height:120px;
padding:10px;
font-size:16px;
margin-bottom:20px;
}

.controls{
display:flex;
gap:20px;
flex-wrap:wrap;
margin-bottom:30px;
justify-content:center;
}

button{
padding:8px 16px;
cursor:pointer;
border:none;
background:black;
color:white;
}

.imagesContainer{
display:flex;
flex-wrap:wrap;
gap:30px;
justify-content:center;
}

.imageBlock{
display:flex;
flex-direction:column;
align-items:center;
}

.squareBox{
width:400px;
height:400px;
padding:30px;
box-sizing:border-box;
font-size:75px;
font-weight:400;
line-height:1.05;
display:flex;
align-items:center;
justify-content:center;
background:#ffffff;
color:#000000;
filter:blur(0px);
overflow:hidden;
}

.squareBox span{
width:100%;
display:block;
transform:scaleY(1.25);
white-space:pre-wrap;
word-break:normal;
overflow-wrap:break-word;
}

footer{
margin-top:60px;
padding:20px;
text-align:center;
background:#f2f2f2;
}

footer a{
margin:0 15px;
text-decoration:none;
color:black;
}

footer a:hover{
text-decoration:underline;
}

</style>
</head>

<body>

<div class="container">

<h2>"Puri 1 Line Likh De Bruh Automatic Generate Kardega Separately"</h2>

<textarea id="lyricsInput" placeholder="Paste full lyrics here..."></textarea>

<div class="controls">

<label>
Text Color
<input type="color" id="textColor" value="#000000">
</label>

<label>
Background
<input type="color" id="bgColor" value="#ffffff">
</label>

<label>
Alignment
<select id="alignSelect">
<option value="justify">Justify</option>
<option value="center">Center</option>
<option value="left">Left</option>
<option value="right">Right</option>
</select>
</label>

<label>
Text Size: <span id="sizeValue">75</span>px
<input type="range" id="textSize" min="10" max="120" step="5" value="75" oninput="updateSizeValue()">
</label>

<button onclick="generateImages()">Generate</button>

</div>

<div id="imagesContainer" class="imagesContainer"></div>

</div>

<footer>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>
<a href="privacy-policy.html">Privacy Policy</a>
</footer>

<script>

function updateSizeValue(){
const slider=document.getElementById("textSize");
const output=document.getElementById("sizeValue");
output.innerText=slider.value;
}

function autoFitText(box,span,maxSize){

let size=maxSize;
span.style.fontSize=size+"px";

while((span.scrollHeight>box.clientHeight || span.scrollWidth>box.clientWidth) && size>10){
size=size-2;
span.style.fontSize=size+"px";
}

}

function generateImages(){

const input=document.getElementById("lyricsInput").value;
if(!input.trim()) return;

const textColor=document.getElementById("textColor").value;
const bgColor=document.getElementById("bgColor").value;
const align=document.getElementById("alignSelect").value;
const textSize=parseInt(document.getElementById("textSize").value);

const container=document.getElementById("imagesContainer");
container.innerHTML="";

const words=input.split(/\s+/);

for(let step=0;step<words.length;step++){

let current=words.slice(0,step+1).join(" ");

const block=document.createElement("div");
block.className="imageBlock";

const box=document.createElement("div");
box.className="squareBox";

box.style.backgroundColor=bgColor;
box.style.color=textColor;

const span=document.createElement("span");

if(align==="justify"){
span.style.textAlign="justify";
span.style.textAlignLast="left";
}else{
span.style.textAlign=align;
}

span.innerText=current;

box.appendChild(span);

autoFitText(box,span,textSize);

const downloadBtn=document.createElement("button");
downloadBtn.innerText="Download Image";

downloadBtn.onclick=function(){

const spanElement = box.querySelector("span");

/* temporarily move blur to text so html2canvas captures it */
const originalBlur = box.style.filter;
box.style.filter = "none";
spanElement.style.filter = "blur(0px)";

html2canvas(box,{scale:2}).then(canvas=>{

const link=document.createElement("a");
link.download="lyrics_"+(step+1)+".png";
link.href=canvas.toDataURL();
link.click();

});

};

block.appendChild(box);
block.appendChild(downloadBtn);

container.appendChild(block);

}

}

updateSizeValue();

</script>

</body>
</html>
